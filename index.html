<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Master.ClAId — 30-day personalised AI mastery curriculum built around your professional context.">
  <!--
    Content-Security-Policy:
    · connect-src restricts fetch() to only Gemini + Groq API endpoints.
      If XSS occurs, exfiltration to attacker-controlled hosts is blocked.
    · frame-ancestors 'none' prevents clickjacking.
    · object-src 'none' blocks Flash/plugin execution.
    · base-uri 'self' prevents base-tag injection.
    · script-src includes 'unsafe-inline' because the app uses inline onclick
      handlers throughout. This is the correct pragmatic trade-off for a
      fully static vanilla-JS app without a build pipeline.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    font-src 'self' data:;
    connect-src https://generativelanguage.googleapis.com https://api.groq.com;
    img-src 'self' data: blob:;
    object-src 'none';
    base-uri 'self';
    frame-ancestors 'none';
  ">
  <title>Master.ClAId</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app"></div>

  <!--
    Script load order is strict — each file depends on the ones above it.
    config   → state → utils → api → generation → grading →
    onboarding → render → modal → portfolio → resources → settings → app
  -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/generation.js"></script>
  <script src="js/grading.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/render.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/portfolio.js"></script>
  <script src="js/resources.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
